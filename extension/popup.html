<!DOCTYPE html>
<html>
<head>
<title>Phishing Detector</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Phishing Detector</h2>

<div class="card">

<div class="section">
<div class="label">URL</div>
<div id="url" class="value">Press scan to analyze</div>
</div>

<button id="check">Scan Current Website</button>

<hr>

<div class="section">
<div class="label">Paste Suspicious Link</div>
<input id="urlInput" placeholder="https://example.com">
<button id="scanInput">Check Link</button>
</div>

<hr>

<div class="section">
<div class="label">Status</div>
<div id="result" class="value">Waiting for scan</div>
</div>

<div class="section">
<div class="label">Risk Score</div>
<div id="risk" class="value">--</div>
</div>

<div class="section">
<div class="label">Details</div>
<div id="details" class="details"></div>
</div>

</div>

<script src="popup.js"></script>

</body>
</html>
